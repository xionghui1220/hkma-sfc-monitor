● name: 每日更新监管动态

  on:
    schedule:
      # 每天香港时间 08:00 运行（UTC 00:00）
      - cron: "0 0 * * *"
    workflow_dispatch:   # 允许手动触发

  permissions:
    contents: write

  jobs:
    scrape-and-deploy:
      runs-on: ubuntu-latest

      steps:
        - name: 检出代码
          uses: actions/checkout@v4

        - name: 设置 Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.11"

        - name: 安装依赖
          run: pip install -r requirements.txt

        - name: 运行抓取脚本
          run: python scraper.py

        - name: 提交并推送更新
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/
            git diff --staged --quiet || git commit -m "自动更新：$(date +'%Y-%m-%d %H:%M') HKT"
            git push
